[project]
name = "governance-deploy"
authors = ["Governance Team"]
description = "Decentralized governance and node management protocol"
telemetry = false
requirements = []
[contracts.protocol-governance]
path = "contracts/protocol-governance.clar"
depends_on = []

[contracts.node-validation]
path = "contracts/node-validation.clar"
depends_on = []

[contracts.node-management]
path = "contracts/node-management.clar"
depends_on = []

[contracts.performance-tracking]
path = "contracts/performance-tracking.clar"
depends_on = []

[contracts.incentive-distribution]
path = "contracts/incentive-distribution.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
